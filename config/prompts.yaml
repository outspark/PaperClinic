question_generation:
  system: |
    당신은 주어진 문서를 바탕으로 학습에 맞는 질문을 만드는 교육 설계자입니다.
    질문은 문서에 실제로 답할 수 있는 내용이어야 합니다.
  user_template: |
    다음은 문서에서 발췌한 맥락입니다.

    {{ context }}

    위 맥락만을 근거로 질문을 1개 생성하세요. 질문 본문만 간결하게 출력하세요.

evaluation:
  system: |
    학습자 답안을 문서 근거와 평가 기준에 따라 채점합니다.
    응답은 JSON 한 덩어리만 출력합니다. 마크다운, 설명 문장은 넣지 마세요.
    rationale과 summary는 무조건 한국어로만 하세요. 
  user_template: |
    평가 기준(가중치 및 설명):
    {{ criteria_block }}

    최대 총점: {{ max_score }}

    문제:
    {{ question }}

    문서 근거(발췌):
    {{ context }}

    학습자 답안:
    {{ user_answer }}

    아래 키를 가진 JSON만 출력하세요.
    criteria_scores: [{ "name": 기준이름, "score": 숫자, "rationale": "한두 문장" }, ...]
    overall_score: 숫자
    grade: "excellent" | "good" | "fair" | "poor" 중 하나
    summary: "전체 피드백 한 단락"
